# Blink user documentation (MATLAB-facing API only).
# Build: pip install -r requirements-docs.txt && mkdocs build --strict

site_name: Blink
site_description: A lightweight web framework for MATLAB

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick start: quick-start.md
  - User guide:
      - Application: application.md
      - Routing: routing.md
      - Request: request.md
      - Response: response.md
      - Static files: static-files.md
      - Patterns: patterns.md
      - API reference: api-reference.md
      - Examples: examples.md
      - Troubleshooting: troubleshooting.md
  - Features & specification:
      - Features: features.md
      - Specification:
          - Overview: specification/index.md
          - HTTP & routing: specification/http-routing.md
          - Request & response: specification/request-response.md
          - Body & uploads: specification/body-uploads.md
          - Middleware & errors: specification/middleware-errors.md
          - Config & lifecycle: specification/config-lifecycle.md
          - Security: specification/security.md
          - Real-time & HTTPS: specification/realtime-https.md
          - Execution model: specification/execution-model.md
      - Stability & versioning: stability.md

strict: true
